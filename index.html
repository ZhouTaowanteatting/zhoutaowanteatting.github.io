<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZhouXiaoTao</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            max-width: 480px;
            width: 90%;
        }
        .avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0 auto 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 44px;
            color: #fff;
        }
        h1 { color: #fff; font-size: 28px; margin-bottom: 8px; }
        .bio { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 32px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .links a {
            display: block; padding: 14px 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff; text-decoration: none; font-size: 16px;
            transition: all 0.3s;
        }
        .links a:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }
        .links a .arrow { float: right; opacity: 0.5; }
        .footer { color: rgba(255,255,255,0.3); font-size: 12px; margin-top: 32px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">🐼</div>
        <h1>ZhouXiaoTao</h1>
        <p class="bio">热爱编程 | 持续学习 | 欢迎交流</p>
        <div class="links">
            <a href="https://github.com/ZhouTaowanteatting" target="_blank">
                💻 GitHub <span class="arrow">→</span>
            </a>
            <a href="https://github.com/ZhouTaowanteatting/news-management-system" target="_blank">
                📰 新闻管理系统 <span class="arrow">→</span>
            </a>
            <a href="https://github.com/ZhouTaowanteatting/movie-analysis" target="_blank">
                🎬 电影分析系统 <span class="arrow">→</span>
            </a>
            <a href="https://github.com/ZhouTaowanteatting/CapsWriter-Offline-fine-tune" target="_blank">
                🎤 CapsWriter 语音输入 <span class="arrow">→</span>
            </a>
        </div>
        <p class="footer">Made with ❤️ by ZhouXiaoTao</p>
    </div>
</body>
</html>
